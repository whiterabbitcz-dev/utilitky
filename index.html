<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utilitky</title>
<style>
  :root {
    --bg: #0f0f10;
    --panel: #1a1a1c;
    --border: #2e2e32;
    --text: #ececec;
    --muted: #9a9aa0;
    --accent: #ff3b6b;
    --accent-2: #833ab4;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 80px 24px;
  }
  h1 {
    font-size: 32px;
    margin: 0 0 8px 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  p.lead { color: var(--muted); margin: 0 0 40px 0; }
  .tool {
    display: block;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 12px;
    color: var(--text);
    text-decoration: none;
    transition: border-color 0.15s, transform 0.15s;
  }
  .tool:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .tool-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .tool-desc { color: var(--muted); font-size: 13px; }
</style>
</head>
<body>
<main>
  <h1>Utilitky</h1>
  <p class="lead">Drobné nástroje v prohlížeči.</p>

  <a class="tool" href="ig-crop-preview.html">
    <div class="tool-title">Instagram Crop Preview</div>
    <div class="tool-desc">Nahraj fotku a podívej se, jak bude vypadat ve všech Instagram formátech (feed, profil, story). Ořezy můžeš posouvat a stáhnout.</div>
  </a>
</main>
</body>
</html>
